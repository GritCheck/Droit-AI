# Development override file
# Use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

version: '3.8'

services:
  frontend:
    environment:
      - NEXT_PUBLIC_ENABLE_LOCAL_PARSING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  backend:
    environment:
      - ENABLE_LOCAL_PARSING=true
      - DEBUG=true
      - LOG_LEVEL=debug
    volumes:
      - ./backend:/app
      - ./data:/app/data
    # Override command for development with hot reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug

  redis:
    ports:
      - "6379:6379"
    # Remove password for local development
    command: redis-server --appendonly yes
