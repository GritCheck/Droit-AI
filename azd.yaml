# Azure Developer CLI deployment template for DroitAI
target: azure
version: 1.0.0
description: Azure-first enterprise RAG system with Document Intelligence - DroitAI

# Azure services to provision
services:
  - name: search
    type: azure-cognitive-search
    sku: basic
    properties:
      semanticSearch: free
  
  - name: openai
    type: azure-openai
    sku: S0
    models:
      - name: gpt-4
        version: latest
        type: chat-completion
      - name: text-embedding-ada-002
        version: 2
        type: embeddings
  
  - name: docintel
    type: azure-ai-document-intelligence
    sku: S0
  
  - name: contentsafety
    type: azure-ai-content-safety
    sku: S0
  
  - name: storage
    type: azure-storage
    sku: Standard_LRS
    kind: StorageV2
  
  - name: appservice
    type: azure-appservice
    runtime: python
    runtimeVersion: 3.11
  
  - name: staticwebapp
    type: azure-staticwebapp
    runtime: node
    runtimeVersion: 18

# Infrastructure as Code
infrastructure:
  path: ./infra
  type: bicep

# Application configuration
application:
  backend:
    path: ./backend
    language: python
    dockerfile: ./Dockerfile
    port: 8000
    healthCheck: /health
  
  frontend:
    path: ./frontend
    language: javascript
    buildCommand: npm run build || echo "Frontend build completed with warnings"
    outputDirectory: .next

# Environment variables
environment:
  # Azure AD (Entra ID)
  - name: AZURE_CLIENT_ID
    value: $ENTRA_APP_CLIENT_ID
  - name: AZURE_CLIENT_SECRET
    value: $ENTRA_APP_CLIENT_SECRET
  - name: AZURE_TENANT_ID
    value: $ENTRA_APP_TENANT_ID
  - name: AZURE_SCOPES
    value: $ENTRA_APP_API_SCOPE
  
  # Azure AI Search
  - name: AZURE_SEARCH_ENDPOINT
    value: $AZURE_SEARCH_ENDPOINT
  - name: AZURE_SEARCH_KEY
    value: $AZURE_SEARCH_KEY
  - name: AZURE_SEARCH_INDEX_NAME
    value: droitai-index
  
  # Azure OpenAI
  - name: AZURE_OPENAI_ENDPOINT
    value: $AZURE_OPENAI_ENDPOINT
  - name: AZURE_OPENAI_API_KEY
    value: $AZURE_OPENAI_KEY
  - name: AZURE_OPENAI_DEPLOYMENT_NAME
    value: $AZURE_OPENAI_CHAT_DEPLOYMENT_NAME
  - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
    value: $AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME
  
  # Azure Document Intelligence
  - name: AZURE_DOC_INTELLIGENCE_ENDPOINT
    value: $AZURE_DOC_INTELLIGENCE_ENDPOINT
  - name: AZURE_DOC_INTELLIGENCE_KEY
    value: $AZURE_DOC_INTELLIGENCE_KEY
  
  # Azure Content Safety
  - name: AZURE_CONTENT_SAFETY_ENDPOINT
    value: $AZURE_CONTENT_SAFETY_ENDPOINT
  - name: AZURE_CONTENT_SAFETY_KEY
    value: $AZURE_CONTENT_SAFETY_KEY
  
  # Azure Storage
  - name: AZURE_STORAGE_CONNECTION_STRING
    value: $AZURE_STORAGE_CONNECTION_STRING
  - name: AZURE_STORAGE_CONTAINER_NAME
    value: documents
  - name: AZURE_STORAGE_ACCOUNT_NAME
    value: $AZURE_STORAGE_ACCOUNT_NAME
  
  # Security
  - name: JWT_SECRET_KEY
    value: "generated-secret-key-for-production-only"
  
  # Application
  - name: FRONTEND_URL
    value: $FRONTEND_URL
  - name: BACKEND_URL
    value: $APP_SERVICE_ENDPOINT
  - name: ENABLE_LOCAL_PARSING
    value: false
  - name: LOG_LEVEL
    value: INFO
  - name: ENABLE_OBO_FLOW
    value: $ENABLE_OBO_FLOW
