# Azure Developer CLI deployment template for DroitAI
target: azure
version: 1.0.0
description: Azure-first enterprise RAG system with Document Intelligence - DroitAI

services:
  app:
    project: ./backend
    host: appservice
    language: python
    runtime: python
    runtimeVersion: "3.11"
    port: 8000
    healthCheck: /health
    env:
      PYTHONPATH: /home/site/wwwroot

  frontend:
    project: ./frontend
    host: appservice
    language: ts
    runtime: node
    runtimeVersion: "20"
    port: 3000
    healthCheck: /api/health
    hooks:
      predeploy:
        windows:
          shell: pwsh
          run: npm run build
        posix:
          shell: bash
          run: npm run build
    env:
      NODE_ENV: production

hooks:
  preprovision:
    posix:
      shell: bash
      run: ./scripts/setup-env.sh
    windows:
      shell: pwsh
      run: ./scripts/setup-env.ps1
  postprovision:
    windows:
      shell: pwsh
      run: |
        ./scripts/sync-data.ps1
        ./scripts/setup-search-index.ps1
    posix:
      shell: bash
      run: |
        ./scripts/sync-data.sh
        ./scripts/setup-search-index.sh

infrastructure:
  path: ./infra
  type: bicep

environment:
  # Azure AI Search — endpoint only; auth via managed identity (SearchIndexDataReader role)
  - name: AZURE_SEARCH_ENDPOINT
    value: $AZURE_SEARCH_ENDPOINT
  - name: AZURE_SEARCH_INDEX_NAME
    value: droitai-search-index

  # Azure OpenAI — endpoint + deployment names; auth via managed identity (CognitiveServicesUser role)
  - name: AZURE_OPENAI_ENDPOINT
    value: $AZURE_OPENAI_ENDPOINT
  - name: AZURE_OPENAI_DEPLOYMENT_NAME
    value: $AZURE_OPENAI_DEPLOYMENT_NAME
  - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
    value: $AZURE_OPENAI_EMBEDDING_DEPLOYMENT

  # Azure Document Intelligence — endpoint only; auth via managed identity (CognitiveServicesUser role)
  - name: AZURE_DOC_INTEL_ENDPOINT
    value: $AZURE_DOC_INTEL_ENDPOINT

  # Azure Content Safety — endpoint only; auth via managed identity (CognitiveServicesUser role)
  - name: AZURE_CONTENT_SAFETY_ENDPOINT
    value: $AZURE_CONTENT_SAFETY_ENDPOINT

  # Azure Storage — account name only; auth via managed identity (StorageBlobDataContributor role)
  - name: AZURE_STORAGE_ACCOUNT_NAME
    value: $AZURE_STORAGE_ACCOUNT_NAME
  - name: AZURE_STORAGE_CONTAINER_NAME
    value: $AZURE_STORAGE_CONTAINER_NAME

  # Application
  - name: FRONTEND_URL
    value: $FRONTEND_URI
  - name: BACKEND_URL
    value: $BACKEND_URI
  - name: ENABLE_LOCAL_PARSING
    value: "false"
  - name: LOG_LEVEL
    value: INFO
  - name: ENABLE_OBO_FLOW
    value: $ENABLE_OBO_FLOW