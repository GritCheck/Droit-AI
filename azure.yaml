# Azure services to provision
services:
  app:
    # 1. Point to the actual Python code folder
    project: ./backend 
    host: appservice
    language: python
    runtime: python
    runtimeVersion: 3.11
    port: 8000
    healthCheck: /health
    
    hooks:
      # 3. Clean up the hooks to avoid the 'test_apis.py' error we saw earlier
      predeploy:
        windows:
          shell: pwsh
          # Only run if the file exists, or comment out until tests are ready
          run: if (Test-Path test_apis.py) { python -m pytest test_apis.py -v }
        posix:
          shell: bash
          run: if [ -f test_apis.py ]; then python -m pytest test_apis.py -v; fi

    env:
      # Keep your existing environment variables...
      PYTHONPATH: /home/site/wwwroot

# Infrastructure as Code
infrastructure:
  path: ./infra
  type: bicep

# Environment variables
environment:
  # Azure AI Search
  - name: AZURE_SEARCH_ENDPOINT
    value: $AZURE_SEARCH_ENDPOINT
  - name: AZURE_SEARCH_KEY
    value: $AZURE_SEARCH_KEY
  - name: AZURE_SEARCH_INDEX_NAME
    value: droitai-index
  
  # Azure OpenAI
  - name: AZURE_OPENAI_ENDPOINT
    value: $AZURE_OPENAI_ENDPOINT
  - name: AZURE_OPENAI_API_KEY
    value: $AZURE_OPENAI_KEY
  - name: AZURE_OPENAI_DEPLOYMENT_NAME
    value: $AZURE_OPENAI_CHAT_DEPLOYMENT_NAME
  - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
    value: $AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME
  
  # Azure Storage
  - name: AZURE_STORAGE_CONNECTION_STRING
    value: $AZURE_STORAGE_CONNECTION_STRING
  - name: AZURE_STORAGE_CONTAINER_NAME
    value: $AZURE_STORAGE_CONTAINER_NAME
  - name: AZURE_STORAGE_ACCOUNT_NAME
    value: $AZURE_STORAGE_ACCOUNT_NAME
  
  # Application
  - name: FRONTEND_URL
    value: $FRONTEND_URL
  - name: BACKEND_URL
    value: $APP_SERVICE_ENDPOINT
  - name: ENABLE_LOCAL_PARSING
    value: false
  - name: LOG_LEVEL
    value: INFO
  - name: ENABLE_OBO_FLOW
    value: $ENABLE_OBO_FLOW
